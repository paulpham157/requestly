name: "🐛 Bug Report"
description: "Something isn't working as expected"
title: "[BUG] "
labels: ["issue", "type:bug"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** Search [existing issues](https://github.com/requestly/requestly/issues) to confirm this isn't a duplicate.

        ---
  - type: checkboxes
    id: client
    attributes:
      label: Client
      options:
        - label: Desktop — macOS
        - label: Desktop — Windows
        - label: Desktop — Linux
        - label: CLI
    validations:
      required: true
  - type: checkboxes
    id: protocol
    attributes:
      label: Protocol
      options:
        - label: HTTP / REST
        - label: GraphQL
        - label: WebSocket
        - label: Socket.IO
        - label: gRPC
        - label: MQTT
        - label: Not protocol-specific
    validations:
      required: true
  - type: checkboxes
    id: feature_area
    attributes:
      label: Feature Area
      options:
        - label: Request editor
        - label: Collections
        - label: Environments & Variables
        - label: Mock Server
        - label: API Design (OpenAPI)
        - label: Collection Runner
        - label: Import / Export
        - label: Authentication
        - label: Scripts
        - label: Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      description: Found in the bottom-left footer of the app
      placeholder: "e.g. v1.2.3"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Screenshots, screen recordings, error messages"
