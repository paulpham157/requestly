name: "💡 Feature Request"
description: "Request a new feature 🎉"
title: "[Feature] "
labels: ["type:feature"]
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** Search [existing issues](https://github.com/requestly/requestly/issues) to confirm this isn't a duplicate.

        ---
  - type: checkboxes
    id: protocol
    attributes:
      label: Protocol
      options:
        - label: HTTP / REST
        - label: GraphQL
        - label: WebSocket
        - label: Socket.IO
        - label: gRPC
        - label: MQTT
        - label: All protocols
        - label: Not protocol-specific
  - type: checkboxes
    id: feature_area
    attributes:
      label: Feature Area
      options:
        - label: Request editor
        - label: Collections
        - label: Environments & Variables
        - label: Mock Server
        - label: API Design (OpenAPI)
        - label: Collection Runner
        - label: Import / Export
        - label: Authentication
        - label: Scripts
        - label: Other
  - type: checkboxes
    id: client
    attributes:
      label: Client
      options:
        - label: Desktop
        - label: CLI
        - label: All clients
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe your workflow and where it breaks down
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried, or other approaches you thought of
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Screenshots, mockups, links to similar features in other tools"
